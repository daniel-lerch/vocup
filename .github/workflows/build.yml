name: Build, Test, and Package

on:
  push:

jobs:
  android:
    name: Android build and create APK

    runs-on: ubuntu-24.04

    env:
      App_Project_File: src/Vocup.Android/Vocup.Android.csproj
      Test_Project_File: tests/Vocup.UnitTests/Vocup.UnitTests.csproj

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    # Install .NET SDK
    - name: Install .NET Core
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Restore .NET Workloads
      run: dotnet workload restore $App_Project_File

    - name: Restore NuGet packages
      run: dotnet restore $App_Project_File

    - name: Execute unit tests
      run: dotnet test $Test_Project_File

    - name: Decode Keystore
      run: |
        echo "${{ secrets.BASE64_ENCODED_JKS }}" | base64 --decode > src/Vocup.Android/vocup-android.jks

    - name: Build and create signed AAB
      run: |
        dotnet build \
          --no-restore \
          --configuration Release \
          -p:AndroidKeyStore=True \
          -p:AndroidSigningStorePass=${{ secrets.JKS_PASSWORD }} \
          -p:AndroidSigningKeyPass=${{ secrets.JKS_PASSWORD }} \
          $App_Project_File

    - name: Upload build artifacts
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-artifact@v7
      with:
        path: src/Vocup.Android/bin/Release/net10.0-android/org.vocup-Signed.aab
        archive: false


  linux:
    name: Linux build

    runs-on: ubuntu-24.04

    env:
      App_Project_File: src/Vocup.Desktop/Vocup.Desktop.csproj
      Test_Project_File: tests/Vocup.UnitTests/Vocup.UnitTests.csproj

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    # Install .NET SDK
    - name: Install .NET Core
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Restore NuGet packages
      run: dotnet restore $App_Project_File

    - name: Execute unit tests
      run: dotnet test $Test_Project_File

    - name: Build x64
      run: dotnet publish -c Release -r linux-x64 --sc -p:PublishReadyToRun=true $App_Project_File
    
    - name: Build arm64
      run: dotnet publish -c Release -r linux-arm64 --sc -p:PublishReadyToRun=true $App_Project_File

    - name: Upload x64 artifacts
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-artifact@v7
      with:
        name: vocup-linux-x64.zip
        path: src/Vocup.Desktop/bin/Release/net10.0/linux-x64/publish

    - name: Upload arm64 artifacts
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-artifact@v7
      with:
        name: vocup-linux-arm64.zip
        path: src/Vocup.Desktop/bin/Release/net10.0/linux-arm64/publish


  windows:
    name: Windows build and package MSIX

    runs-on: windows-latest  # For a list of available runner types, refer to
                             # https://help.github.com/en/actions/reference/workflow-syntax-for-github-actions#jobsjob_idruns-on

    env:
      Solution_Name: Vocup.slnx                                         # Replace with your solution name, i.e. MyWpfApp.sln.
      App_Project_Directory: src\Vocup.WinForms
      App_Package_Name: 9961VectorData.Vocup
      Test_Project_Directory: tests\Vocup.WinForms.UnitTests

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install .NET Core
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Install winapp CLI
      uses: microsoft/setup-WinAppCli@v0.1

    - name: Restore NuGet packages
      run: dotnet restore $env:Test_Project_Directory

    - name: Execute WinForms unit tests
      run: dotnet test $env:Test_Project_Directory

    - name: Build x64
      run: dotnet publish -c Release -r win-x64 --sc /p:PublishReadyToRun=true $env:App_Project_Directory

    - name: Create MSIX package (x64)
      run: winapp pack src\Vocup.WinForms\bin\Release\net10.0-windows10.0.26100.0\win-x64\publish --manifest src\Vocup.WinForms\Package.appxmanifest

    - name: Build arm64
      run: dotnet publish -c Release -r win-arm64 --sc /p:PublishReadyToRun=true $env:App_Project_Directory

    - name: Create MSIX package (arm64)
      run: winapp pack src\Vocup.WinForms\bin\Release\net10.0-windows10.0.26100.0\win-arm64\publish --manifest src\Vocup.WinForms\Package.appxmanifest

    - name: Gather MSIX files
      id: gather
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        $gatherDirectory = Join-Path $env:App_Project_Directory "obj" "Bundle"
        New-Item -ItemType Directory -Path $gatherDirectory | Out-Null

        $msixFiles = Get-ChildItem -Depth 1 -Include "$env:App_Package_Name*.msix"
        $msixFiles | ForEach-Object { Copy-Item -Path $_.FullName -Destination $gatherDirectory }
        Write-Output "Copied $($msixFiles.Count) MSIX files to $gatherDirectory"

        $version = $msixFiles[0].BaseName.Split("_")[1]
        Write-Output "Bundle version based on MSIX file name is $version"

        $bundleDirectory = Join-Path $env:App_Project_Directory "bin" "AppPackages"
        New-Item -ItemType Directory -Path $bundleDirectory | Out-Null

        $bundleFile = Join-Path $bundleDirectory "$($env:App_Package_Name)_$($version)_x64_arm64.msixbundle"

        Write-Output "gather_directory=$gatherDirectory" >> $env:GITHUB_OUTPUT
        Write-Output "bundle_directory=$bundleDirectory" >> $env:GITHUB_OUTPUT
        Write-Output "bundle_version=$version" >> $env:GITHUB_OUTPUT
        Write-Output "bundle_file=$bundleFile" >> $env:GITHUB_OUTPUT

    - name: Create MSIX bundle
      if: startsWith(github.ref, 'refs/tags/')
      uses: LanceMcCarthy/Action-MsixBundler@v2.0.0
      with:
        msix-folder: ${{ steps.gather.outputs.gather_directory }}
        msixbundle-filepath: ${{ steps.gather.outputs.bundle_file }}
        msixbundle-version: ${{ steps.gather.outputs.bundle_version }}
        sdk-version: '10.0.26100.0' # Default 10.0.19041.0 does not work anymore in September 2025

    - name: Upload build artifacts
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-artifact@v7
      with:
        path: ${{ steps.gather.outputs.bundle_file }}
        archive: false
