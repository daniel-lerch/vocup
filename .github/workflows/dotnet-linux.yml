name: Linux

on:
  push:

jobs:

  build:
    name: Build

    runs-on: ubuntu-24.04

    env:
      App_Project_File: src/Vocup.Desktop/Vocup.Desktop.csproj
      Test_Project_File: tests/Vocup.UnitTests/Vocup.UnitTests.csproj

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    # Install .NET SDK
    - name: Install .NET Core
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Restore NuGet packages
      run: dotnet restore $App_Project_File

    - name: Execute unit tests
      run: dotnet test $Test_Project_File

    - name: Build x64
      run: dotnet publish -c Release -r linux-x64 -p:PublishReadyToRun=true $App_Project_File
    
    - name: Build arm64
      run: dotnet publish -c Release -r linux-arm64 -p:PublishReadyToRun=true $App_Project_File

    - name: Upload x64 artifacts
      #if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-artifact@v7
      with:
        name: vocup-linux-x64
        path: src/Vocup.Desktop/bin/Release/net10.0/linux-x64/publish

    - name: Upload arm64 artifacts
      #if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-artifact@v7
      with:
        name: vocup-linux-arm64
        path: src/Vocup.Desktop/bin/Release/net10.0/linux-arm64/publish
